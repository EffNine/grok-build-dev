# Build and publish platform binaries for the BYOK fork installer.
#
# Trigger:
#   git tag v0.2.106 && git push origin v0.2.106
#   # or: Actions → Release → Run workflow
#
# Assets are named to match install.sh / `grok update` (gh-release):
#   grok-{version}-{os}-{arch}   e.g. grok-0.2.106-macos-aarch64

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.106). Defaults to package version."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Keep release artifacts lean for GitHub Releases download size.
  CARGO_PROFILE_RELEASE_LTO: "thin"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            PKG_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/codegen/xai-grok-pager-bin/Cargo.toml | head -1)
            TAG="v${PKG_VER}"
          fi
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._]+)?$ ]]; then
            echo "Invalid version/tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            platform: macos-aarch64
            target: aarch64-apple-darwin
          - runner: macos-13
            platform: macos-x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.platform }}
          cache-targets: true

      - name: Install DotSlash (protoc wrapper)
        run: cargo install dotslash --locked

      - name: Build release binary
        run: cargo build -p xai-grok-pager-bin --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          BIN="target/${{ matrix.target }}/release/xai-grok-pager"
          OUT="grok-${VERSION}-${PLATFORM}"
          cp "$BIN" "$OUT"
          chmod +x "$OUT"
          "./$OUT" --version || true
          echo "artifact=$OUT" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-${{ needs.version.outputs.version }}-${{ matrix.platform }}
          path: grok-${{ needs.version.outputs.version }}-${{ matrix.platform }}
          if-no-files-found: error

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -lah dist/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Grok ${{ needs.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: dist/grok-*
          body: |
            BYOK fork release `${{ needs.version.outputs.version }}`.

            ## Install
            ```sh
            curl -fsSL https://raw.githubusercontent.com/effnine/grok-build-dev/main/install.sh | bash
            ```
            Or pin a version:
            ```sh
            curl -fsSL https://raw.githubusercontent.com/effnine/grok-build-dev/main/install.sh | bash -s ${{ needs.version.outputs.version }}
            ```

            ## Assets
            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `grok-${{ needs.version.outputs.version }}-macos-aarch64` |
            | macOS Intel | `grok-${{ needs.version.outputs.version }}-macos-x86_64` |
            | Linux x86_64 | `grok-${{ needs.version.outputs.version }}-linux-x86_64` |
            | Linux arm64 | `grok-${{ needs.version.outputs.version }}-linux-aarch64` |
